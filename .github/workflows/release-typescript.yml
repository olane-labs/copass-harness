name: release-typescript

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'Release mode'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - prerelease
          - graduate
          - dry-run

concurrency:
  group: release-typescript
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Bump versions (stable)
        if: ${{ inputs.release_mode == 'stable' }}
        run: npx lerna version --conventional-commits --yes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump versions (prerelease)
        if: ${{ inputs.release_mode == 'prerelease' }}
        run: npx lerna version --conventional-commits --conventional-prerelease --preid next --yes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump versions (graduate prereleases)
        if: ${{ inputs.release_mode == 'graduate' }}
        run: npx lerna version --conventional-commits --conventional-graduate --yes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dry-run publish
        if: ${{ inputs.release_mode == 'dry-run' }}
        run: npx lerna exec --no-bail -- npm publish --dry-run --access public

      - name: Publish (stable)
        if: ${{ inputs.release_mode == 'stable' || inputs.release_mode == 'graduate' }}
        run: npx lerna publish from-package --yes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish (prerelease)
        if: ${{ inputs.release_mode == 'prerelease' }}
        run: npx lerna publish from-package --dist-tag next --yes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
